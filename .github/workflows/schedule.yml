name: 스케쥴 알리미

on:
  schedule:
    # 알림이 실제 나가는 KST 시간대에만 '깨어나서' 확인 (하루 3회 = 월 ~90회).
    # cron 시각 != 발송 시각: 스크립트가 KST를 보고 해당 일정만 발송하며,
    # GHA cron 지연(10~30분)은 윈도우(±90분)로 흡수한다.
    - cron: '30 23 * * *'   # 08:30 KST — 아침 일정(코마케팅·추가금액·용인·수원 충전 직전)
    - cron: '5 12 * * *'    # 21:05 KST — 지역화폐 충전 전날 저녁(화성·수원)
    - cron: '5 14 * * *'    # 23:05 KST — 화성 자정 직전
  workflow_dispatch:        # 수동 실행 버튼
    inputs:
      force_now:
        description: '테스트용 KST 시각 (예: 2026-05-31T21:00). 비우면 현재시각'
        required: false
        default: ''

permissions:
  contents: write           # state.json 커밋용

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 알림 실행
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_NOW:        ${{ github.event.inputs.force_now }}
        run: python run_cloud.py

      - name: state.json 커밋
        run: |
          git config user.name  "schedule-bot"
          git config user.email "schedule@github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "state: $(date -u '+%Y-%m-%dT%H:%MZ')"
          git push || true
