name: 스케쥴 알리미

on:
  schedule:
    # cron 시각 != 발송 시각: 스크립트가 KST를 보고 '시각이 지난' 일정을 따라잡아 발송.
    # ⚠️ GitHub 무료 스케줄러는 예약시각보다 2~4시간 늦게/가끔 누락되어 실행됨.
    #    → 코드의 catch-up 창(시각 지나면 그날 안에 발송)으로 누락을 막고,
    #      아래처럼 각 시간대에 1~2개 깨움을 둬서 지연 폭을 흡수한다.
    - cron: '30 23 * * *'   # 08:30 KST — 아침 일정(코마케팅·추가금액·용인·수원 충전 직전)
    - cron: '30 1 * * *'    # 10:30 KST — 아침 보조(08:30 깨움이 지연/누락될 때 따라잡기)
    - cron: '5 12 * * *'    # 21:05 KST — 지역화폐 충전 전날 저녁(화성·수원)
    - cron: '5 14 * * *'    # 23:05 KST — 화성 자정 직전
  workflow_dispatch:        # 수동 실행 버튼
    inputs:
      force_now:
        description: '테스트용 KST 시각 (예: 2026-05-31T21:00). 비우면 현재시각'
        required: false
        default: ''

permissions:
  contents: write           # state.json 커밋용

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 알림 실행
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_NOW:        ${{ github.event.inputs.force_now }}
        run: python run_cloud.py

      - name: state·oneoff 커밋
        run: |
          git config user.name  "schedule-bot"
          git config user.email "schedule@github.com"
          git add state.json oneoff.json
          git diff --cached --quiet || git commit -m "state: $(date -u '+%Y-%m-%dT%H:%MZ')"
          git push || true
